services:
  app:
    build:
      dockerfile: ./Dockerfile
    ports:
      - "8000:8000"
    command:
      - gunicorn
      - mysite.wsgi:application
      - --bind
      - "0.0.0.0:8000"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-file: "10"
        max-size: "200k"
    volumes:
      - ./mysite/database:/app/database
    env_file:
      - .env

