{% extends 'shopapp/base.html' %}

{% load i18n %}

{% block title %}
    {% translate "Update order" %} #{{ object.pk }}
{% endblock %}

{% block content %}
    <h1>{% translate "Update order" %} #{{ object.pk }}</h1>
    <div>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">{% translate "Update" %}</button>
        </form>
    </div>

    <div>
        <a href="{% url 'shopapp:order_detail' pk=object.pk %}">
            {% translate "Return to order" %} #{{ object.pk }}
        </a>
    </div>
{% endblock %}
