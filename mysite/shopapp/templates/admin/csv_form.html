{% extends 'admin/base_site.html' %}

{% load i18n %}

{% block title %}
    {% translate "Import CSV" %}
{% endblock %}

{% block content %}
    <h1>{% translate "Import CSV" %}</h1>

    <form action="." method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="submit-row">
            <input type="submit" value="{% translate 'Upload CSV' %}">
        </div>
    </form>
{% endblock %}
